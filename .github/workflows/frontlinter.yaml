name: Frontend CI

on:
  push:
    paths:
      - 'aima-front/**'
  pull_request:
    paths:
      - 'aima-front/**'
jobs:
  lint:
    runs-on: ubuntu-latest
default:
  run:
    working-directory: aima-front
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint 